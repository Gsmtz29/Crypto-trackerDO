version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: crypto_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cryptodb
      MYSQL_USER: cryptouser
      MYSQL_PASSWORD: cryptopass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: crypto_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: cryptouser
      DB_PASSWORD: cryptopass
      DB_NAME: cryptodb
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: crypto_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
